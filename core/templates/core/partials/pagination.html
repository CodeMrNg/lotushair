{% if page_obj.has_other_pages %}
  <nav class="pagination" aria-label="Pagination">
    {% if page_obj.has_previous %}
      <a class="pagination-link" href="?{{ page_param|default:'page' }}={{ page_obj.previous_page_number }}{% if query %}&q={{ query|urlencode }}{% endif %}">Precedent</a>
    {% else %}
      <span class="pagination-link is-disabled">Precedent</span>
    {% endif %}

    <span class="pagination-current">
      Page {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}
    </span>

    {% if page_obj.has_next %}
      <a class="pagination-link" href="?{{ page_param|default:'page' }}={{ page_obj.next_page_number }}{% if query %}&q={{ query|urlencode }}{% endif %}">Suivant</a>
    {% else %}
      <span class="pagination-link is-disabled">Suivant</span>
    {% endif %}
  </nav>
{% endif %}
