{% if messages %}
  <div class="message-modal is-open" role="dialog" aria-modal="true" aria-labelledby="message-modal-title" data-message-modal{% if oob %} hx-swap-oob="beforeend:body"{% endif %}>
    <div class="message-modal-card">
      <button class="message-modal-close" type="button" aria-label="Fermer la notification" data-message-modal-close>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
      <div class="message-modal-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <h2 id="message-modal-title">Notification</h2>
      <div class="messages">
        {% for message in messages %}
          <div class="message {{ message.tags }}" role="status">{{ message }}</div>
        {% endfor %}
      </div>
      <button class="btn primary" type="button" data-message-modal-close>OK</button>
    </div>
  </div>
{% endif %}
