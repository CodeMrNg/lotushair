{% extends "core/base.html" %}
{% block content %}
<section class="page" style="padding-top: 10px;">
  <div class="section-head" style="align-items: center;">
    <h1 style="margin: 0;">Gestion des Paiements</h1>
    <a class="btn" href="{% url 'staff_dashboard' %}" style="display: inline-flex; align-items: center; border-color: var(--color-border); color: var(--color-brand-plum);">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Retour
    </a>
  </div>

  <div class="split">
    <form method="post" class="panel form-grid" style="border-top: 4px solid var(--color-brand-plum); padding: 28px;" hx-post="{% url 'manage_payments' %}" hx-target="#payments-table" hx-swap="outerHTML">
      <h2 style="font-family: var(--font-heading); margin-bottom: 20px;">Saisir un versement</h2>
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn primary" type="submit" style="width: 100%; margin-top: 10px;">
        Enregistrer le paiement
      </button>
    </form>
    {% include "core/partials/payment_table.html" %}
  </div>
</section>
{% endblock %}
