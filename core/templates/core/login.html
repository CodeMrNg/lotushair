{% extends "core/base.html" %}
{% load static %}
{% block title %}Connexion membre - Lotus Hair{% endblock %}
{% block content %}
<section class="auth-shell">
  <div class="auth-deco" aria-hidden="true"></div>
  <div class="auth-panel">
    <img class="auth-logo" src="{% static 'core/img/logo.jpeg' %}" alt="Lotus Hair">
    <p class="eyebrow">Espace membre</p>
    <h1>Bienvenue</h1>
    <p style="margin-bottom: 24px; font-size: 0.9rem;">Entrez votre code secret à 6 caractères pour accéder à votre espace tontine et catalogue.</p>
    <form method="post" class="form-stack">
      {% csrf_token %}
      <div style="display: grid; gap: 8px;">
        <label for="{{ form.code.id_for_label }}" style="display: flex; align-items: center; gap: 6px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-gold-metallic);"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Code de connexion
        </label>
        {{ form.code }}
      </div>
      <button class="btn primary" type="submit" style="margin-top: 10px; width: 100%;">
        Accéder à mon espace
      </button>
    </form>
  </div>
</section>
{% endblock %}
